name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  managed:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
        dotnet: [net8.0, net9.0]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore
        run: dotnet restore CrashlessLLM.sln
      - name: Build managed
        run: dotnet build CrashlessLLM.sln --configuration Release --no-restore
      - name: Stress tests with deterministic native shim
        run: |
          test_model="$RUNNER_TEMP/crashless-ci-model.gguf"
          printf "ci" > "$test_model"
          CRASHLESS_TEST_MODEL_PATH="$test_model" dotnet test CrashlessLLM.StressTests/CrashlessLLM.StressTests.csproj --configuration Release --framework ${{ matrix.dotnet }} --no-build
        shell: bash

  # Native build is gated behind llama.cpp availability.
  # To enable: clone llama.cpp into a sibling directory and set CRASHLESS_LLAMA_CPP_DIR.
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for CMake
        id: cmake
        run: |
          if command -v cmake &> /dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - name: Native build (conditional)
        if: steps.cmake.outputs.available == 'true'
        run: |
          cd native
          # This job succeeds even if llama.cpp is missing, because the real
          # native build is documented as a pre-release manual step.
          if [ -d "${{ github.workspace }}/../llama.cpp" ]; then
            cmake -S . -B build -DCRASHLESS_LLAMA_CPP_DIR="${{ github.workspace }}/../llama.cpp"
            cmake --build build --config Release
          else
            echo "llama.cpp not available at sibling path; skipping real native build."
            echo "Set CRASHLESS_LLAMA_CPP_DIR to enable this step."
          fi
        shell: bash

  pack:
    runs-on: ubuntu-latest
    needs: managed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Pack
        run: dotnet pack src/CrashlessLLM/CrashlessLLM.csproj --configuration Release
      - name: Verify package contents
        run: |
          pkg=$(find src/CrashlessLLM/bin/Release -name '*.nupkg' | head -n 1)
          echo "Package: $pkg"
          if [ -z "$pkg" ]; then
            echo "ERROR: No .nupkg produced"
            exit 1
          fi
          unzip -l "$pkg"
          # Ensure README and LICENSE are present
          if ! unzip -l "$pkg" | grep -q "README.md"; then
            echo "ERROR: README.md missing from package"
            exit 1
          fi
          if ! unzip -l "$pkg" | grep -q "LICENSE"; then
            echo "ERROR: LICENSE missing from package"
            exit 1
          fi
        shell: bash
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: crashlessllm-nupkg
          path: src/CrashlessLLM/bin/Release/*.nupkg
