name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  managed:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
        dotnet: [net8.0, net9.0]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore
        run: dotnet restore CrashlessLLM.sln
      - name: Build managed
        run: dotnet build CrashlessLLM.sln --configuration Release --no-restore
      - name: Stress tests with deterministic native shim
        run: |
          test_model="$RUNNER_TEMP/crashless-ci-model.gguf"
          printf "ci" > "$test_model"
          CRASHLESS_TEST_MODEL_PATH="$test_model" dotnet test CrashlessLLM.StressTests/CrashlessLLM.StressTests.csproj --configuration Release --framework ${{ matrix.dotnet }} --no-build
        shell: bash

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: libcrashless_core.dylib
            rid: osx-arm64
          - os: macos-13
            artifact: libcrashless_core.dylib
            rid: osx-x64
          - os: ubuntu-latest
            artifact: libcrashless_core.so
            rid: linux-x64
          - os: ubuntu-24.04-arm
            artifact: libcrashless_core.so
            rid: linux-arm64
          - os: windows-latest
            artifact: crashless_core.dll
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git "${{ github.workspace }}/../llama.cpp"
        shell: bash
      - name: Build native core
        run: |
          cd native
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCRASHLESS_LLAMA_CPP_DIR="${{ github.workspace }}/../llama.cpp"
          cmake --build build --config Release
        shell: bash
      - name: Copy native artifact
        run: |
          mkdir -p "runtimes/${{ matrix.rid }}/native"
          cp "native/build/${{ matrix.artifact }}" "runtimes/${{ matrix.rid }}/native/"
        shell: bash
      - name: Smoke-test native binary
        run: |
          echo "Native binary: $(file runtimes/${{ matrix.rid }}/native/${{ matrix.artifact }})"
          test -f "runtimes/${{ matrix.rid }}/native/${{ matrix.artifact }}" || exit 1
        shell: bash
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: crashless-core-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/${{ matrix.artifact }}

  pack:
    runs-on: ubuntu-latest
    needs: managed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Pack
        run: dotnet pack src/CrashlessLLM/CrashlessLLM.csproj --configuration Release
      - name: Verify package contents
        run: |
          pkg=$(find src/CrashlessLLM/bin/Release -name '*.nupkg' | head -n 1)
          echo "Package: $pkg"
          if [ -z "$pkg" ]; then
            echo "ERROR: No .nupkg produced"
            exit 1
          fi
          unzip -l "$pkg"
          # Ensure README and LICENSE are present
          if ! unzip -l "$pkg" | grep -q "README.md"; then
            echo "ERROR: README.md missing from package"
            exit 1
          fi
          if ! unzip -l "$pkg" | grep -q "LICENSE"; then
            echo "ERROR: LICENSE missing from package"
            exit 1
          fi
        shell: bash
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: crashlessllm-nupkg
          path: src/CrashlessLLM/bin/Release/*.nupkg